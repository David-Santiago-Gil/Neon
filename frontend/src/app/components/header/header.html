<header class="main-header glass">
  <div class="container d-flex align-items-center justify-content-between h-100">
    <div class="logo d-flex gap-2 align-items-center" (click)="scrollTo('hero')">
      <span class="neon-text">NEON</span>
      <span class="royale-text">ROYALE</span>
    </div>

    <nav class="nav-menu d-none d-lg-flex gap-4">
      <a (click)="scrollTo('hero')">Inicio</a>
      <a (click)="scrollTo('juegos')">Juegos</a>
      <a (click)="scrollTo('promociones')">Promociones</a>
      <a (click)="scrollTo('contacto')">Contacto</a>
    </nav>

    <div class="auth-buttons d-flex gap-3">
      @if (!authService.isAuthenticated()) {
        <button class="btn btn-outline-light btn-sm px-3" (click)="openLogin.emit()">Login</button>
        <button class="btn btn-warning btn-sm px-3 shadow-sm text-dark fw-bold" (click)="openRegister.emit()">Register</button>
      } @else {
        <span class="text-light" style="font-size:0.8rem; margin:auto">¡Hola, <b style="color:#C9A84C">{{authService.currentUser()?.usuario}}</b>!</span>
        
        @if (authService.currentUser()?.rol === 'admin') {
          <button class="btn btn-warning btn-sm px-3 text-dark fw-bold" (click)="scrollTo('panel-admin')"><i class="bi bi-shield-lock-fill"></i> Panel VIP</button>
        }
        
        <button class="btn btn-outline-light btn-sm px-3" (click)="authService.logout()">Cerrar Sesión</button>
      }
    </div>
  </div>
</header>
